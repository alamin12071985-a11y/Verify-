<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verification Organization</title>
    <style>
        /* Reset & Base */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1c1c1e; /* Dark Background */
            color: #ffffff;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        /* Hidden Utility */
        .hidden { display: none !important; }

        /* Icon Styles */
        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px;
            font-size: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* 1. Access UI (Initial) */
        .screen-access .icon-circle {
            background-color: #2c2c2e; /* Dark Grey */
            color: #007aff; /* Blue */
            border: 1px solid #3a3a3c;
        }
        .screen-access p {
            font-size: 17px;
            color: #8e8e93;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .screen-access .highlight {
            color: #fff;
            font-weight: 600;
        }

        /* Verify Button */
        .btn-verify {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }
        .btn-verify:active { opacity: 0.8; }
        .btn-verify:disabled { background-color: #3a3a3c; }

        /* 2. Loading UI */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #007aff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 3. Status UI (Success/Fail) */
        .screen-status h2 {
            margin: 0 0 8px 0;
            font-size: 20px;
            font-weight: 600;
        }
        .screen-status p {
            font-size: 15px;
            color: #8e8e93;
            margin: 0 0 30px 0;
        }

        /* Success Theme */
        .screen-status.success .icon-circle {
            background-color: #34c759; /* Green */
        }
        .screen-status.success h2 { color: #34c759; }

        /* Fail Theme */
        .screen-status.fail .icon-circle {
            background-color: #ff3b30; /* Red */
        }
        .screen-status.fail h2 { color: #ff3b30; }

        /* Continue Button (For Fail/Manual Close) */
        .btn-continue {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
        }

        /* Fake Inputs for Testing (Hidden in real app) */
        .test-panel {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            opacity: 0.5;
            font-size: 10px;
            z-index: 99;
        }
        .test-panel input {
            width: 100%;
            margin-bottom: 2px;
            padding: 5px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <!-- SCREEN 1: Access UI (Initial) -->
    <div id="screen-access" class="container screen-access">
        <div class="icon-circle">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            </svg>
        </div>
        <p>
            Access to you device<br>
            <span class="highlight">Verification Organization</span>
        </p>
        <button class="btn-verify" onclick="startVerification()">Verify</button>
    </div>

    <!-- SCREEN 2: Loading UI -->
    <div id="screen-loading" class="container hidden">
        <div class="spinner"></div>
        <p style="color:#8e8e93;">Device Verification<br>Please wait...</p>
    </div>

    <!-- SCREEN 3: Status UI (Success/Fail) -->
    <div id="screen-status" class="container screen-status hidden">
        <div class="icon-circle" id="status-icon">
            <!-- Icon inserted via JS -->
        </div>
        <h2 id="status-title">Title</h2>
        <p id="status-msg">Message</p>
        <!-- Button visible only on Fail -->
        <button id="btn-continue" class="btn-continue hidden" onclick="closeApp()">Continue to Bot</button>
    </div>

    <!-- DEBUG PANEL: For testing purposes. Remove in production. -->
    <div class="test-panel">
        <input type="text" id="f_user_id" placeholder="User ID (e.g. 123456)">
        <input type="text" id="f_bot" placeholder="Bot Username (e.g. MyBot)">
        <input type="text" id="f_hash" placeholder="Hash (e.g. abcdef)">
    </div>

    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Switch Screen Function
        function showScreen(screenId) {
            document.querySelectorAll('.container').forEach(el => el.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
        }

        // Close App Function
        function closeApp() {
            try {
                tg.close(); // Close Telegram WebApp
            } catch (e) {
                window.history.back(); // Fallback for browser
            }
        }

        // Main Verification Logic
        async function startVerification() {
            // 1. Get Data (Use Test Panel OR Telegram InitData)
            const user_id = document.getElementById('f_user_id').value || "test_user_123";
            const bot = document.getElementById('f_bot').value || "test_bot";
            const botHash = document.getElementById('f_hash').value || "hash_123";

            // 2. Generate Device Fingerprint (Simple & Powerful)
            const fingerprint = [
                navigator.userAgent,
                navigator.language,
                screen.colorDepth,
                screen.width + 'x' + screen.height,
                new Date().getTimezoneOffset(),
                navigator.hardwareConcurrency
            ].join('|');

            // Simple Hash Function
            let fp_hash = 0;
            for (let i = 0; i < fingerprint.length; i++) {
                fp_hash = ((fp_hash << 5) - fp_hash) + fingerprint.charCodeAt(i);
                fp_hash = fp_hash & fp_hash;
            }
            const device_id = "DEV_" + Math.abs(fp_hash).toString(16);

            // 3. Show Loading
            showScreen('screen-loading');

            try {
                // 4. Call Worker API
                const response = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user_id,
                        bot: bot,
                        botHash: botHash,
                        device_fingerprint: device_id
                    })
                });

                const result = await response.json();

                // 5. Handle Result
                if (result.status === 'success') {
                    showSuccess("Already Verified", "This account is already verified.");
                    
                    // Auto Close after 2 seconds
                    setTimeout(() => {
                        closeApp();
                    }, 2000);

                } else {
                    // Handle Failure (Multi-account or Banned)
                    showFail("Verification Failed", result.message || "Multiple devices detected.");
                }

            } catch (err) {
                showFail("Connection Error", "Could not connect to server.");
            }
        }

        function showSuccess(title, msg) {
            showScreen('screen-status');
            const container = document.getElementById('screen-status');
            container.classList.remove('fail');
            container.classList.add('success');
            
            document.getElementById('status-title').innerText = title;
            document.getElementById('status-msg').innerText = msg;
            document.getElementById('btn-continue').classList.add('hidden'); // Hide button on success

            // Green Check Icon
            document.getElementById('status-icon').innerHTML = `
                <svg width="40" height="40" viewBox="0 0 24 24" fill="white">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                </svg>`;
        }

        function showFail(title, msg) {
            showScreen('screen-status');
            const container = document.getElementById('screen-status');
            container.classList.remove('success');
            container.classList.add('fail');

            document.getElementById('status-title').innerText = title;
            document.getElementById('status-msg').innerText = msg;
            document.getElementById('btn-continue').classList.remove('hidden'); // Show button on fail

            // Red Cross Icon
            document.getElementById('status-icon').innerHTML = `
                <svg width="40" height="40" viewBox="0 0 24 24" fill="white">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>`;
        }
    </script>
</body>
</html>
